<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="#1f2937" />
  
  <!-- Outer rounded square (representing a cube face or sudoku border) -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="none" stroke="#f472b6" stroke-width="6" />
  
  <!-- Grid lines (representing grid of sudoku/cube) -->
  <path d="M40 20 V80 M60 20 V80 M20 40 H80 M20 60 H80" stroke="#f472b6" stroke-width="2" opacity="0.6"/>

  <!-- Inner circle representing a camera lens -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="#10b981" stroke-width="5" />
</svg>
